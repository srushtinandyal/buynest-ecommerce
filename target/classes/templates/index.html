<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BuyNest</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h2>🛍️ BuyNest</h2>
    <a href="/cart">🛒 Cart</a>
</div>

<h1>Our Products</h1>

<div class="container">

<div class="product">
    <img src="/images/phone.jpg" alt="Phone">
    <h3>📱 Phone</h3>
    <p>₹10000</p>
    <button onclick="addToCart('Phone', 10000)">Add to Cart</button>
</div>

<div class="product">
    <img src="/images/laptop.jpg" alt="Laptop">
    <h3>💻 Laptop</h3>
    <p>₹50000</p>
    <button onclick="addToCart('Laptop', 50000)">Add to Cart</button>
</div>
<div class="product">
    <img src="/images/headphone.jpg" alt="Headphones">
    <h3>🎧 Headphones</h3>
    <p>₹2000</p>
    <button onclick="addToCart('Headphones', 2000)">Add to Cart</button>
</div>

<div class="product">
    <img src="/images/watch.jpg" alt="Watch">
    <h3>⌚ Watch</h3>
    <p>₹1500</p>
    <button onclick="addToCart('Watch', 1500)">Add to Cart</button>
</div>

<div class="product">
    <img src="/images/camera.jpg" alt="Camera">
    <h3>📷 Camera</h3>
    <p>₹25000</p>
    <button onclick="addToCart('Camera', 25000)">Add to Cart</button>
</div>

<div class="product">
    <img src="/images/gaming console.jpg" alt="Gaming Console">
    <h3>🎮 Gaming Console</h3>
    <p>₹30000</p>
    <button onclick="addToCart('Console', 30000)">Add to Cart</button>
</div>

</div>

<script src="/script.js"></script>

</body>
</html>
